spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bookphrase?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:bookphrase-secret-key-must-be-at-least-256-bits-long-for-security}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

logging:
  level:
    com.bookphrase: DEBUG
    org.hibernate.SQL: DEBUG
