spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookphrase?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password:   # 본인 MySQL 비밀번호 입력
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create   # 개발 초기: create / 운영: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  security:
    user:
      name: admin         # Spring Security 기본 유저 (개발용)
      password: admin

server:
  port: 8080

jwt:
  secret: bookphrase-secret-key-must-be-at-least-256-bits-long-for-security
  expiration: 86400000        # 24시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

logging:
  level:
    com.bookphrase: DEBUG
    org.hibernate.SQL: DEBUG
