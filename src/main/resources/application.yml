spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bookphrase?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false   # 프로덕션에서 SQL 로그 비활성화 (로그 폭발 방지)

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}  # 로컬은 local, Railway는 prod

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

aladin:
  ttb:
    key: ${ALADIN_TTB_KEY:your-aladin-ttb-key}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}

# 기본 로그 레벨: INFO (프로덕션 기준)
# 로컬 개발 시 application-local.yml 에서 DEBUG로 오버라이드됨
logging:
  level:
    root: INFO
    com.bookphrase: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
